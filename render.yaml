services:
  - type: web
    name: torquebattrainer
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: torquebattrainer-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: torquebattrainer-db
    plan: free
